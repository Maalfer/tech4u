# ── Cloudflare Real IP ───────────────────────────────────────────────────────
# set_real_ip_from is valid inside http{} context.
# This file is included via conf.d/ which lives inside http{}.
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    server_name tech4uacademy.es www.tech4uacademy.es;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # ── Proxy shared settings (applies to all proxy_pass in this server) ─────
    proxy_http_version 1.1;
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      120s;
    proxy_buffer_size       16k;
    proxy_buffers           4 16k;
    proxy_busy_buffers_size 32k;

    # Shared proxy headers macro (repeated per location — nginx has no variables for this)
    # CRITICAL: always use service name 'backend', never localhost/127.0.0.1

    # ═══════════════════════════════════════════════════════════════════════
    # BACKEND ROUTES — ^~ prefix match
    # ^~ prevents regex locations from overriding these prefixes.
    # This is the most reliable way to ensure backend routes are never
    # intercepted by the React SPA fallback (location /).
    # ═══════════════════════════════════════════════════════════════════════

    # ── Rate-limited exact matches (highest priority) ─────────────────────
    location = /auth/login {
        limit_req zone=login_zone burst=10 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
    }

    location = /auth/register {
        limit_req zone=register_zone burst=5 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
    }

    # ── OAuth callback — React SPA (must be BEFORE the ^~ /oauth/ block) ─
    # The backend redirects here after Google/Microsoft OAuth completes.
    # This is a React Router route (/oauth/callback), NOT a backend route.
    # Exact match (=) takes priority over ^~ prefix match.
    location = /oauth/callback {
        root  /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # ── Auth routes ────────────────────────────────────────────────────────
    location ^~ /auth/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
    }

    # ── OAuth (Google / Microsoft) — CRITICAL for OAuth flow ──────────────
    location ^~ /oauth/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
    }

    # ── API with /api/ prefix (strip prefix before forwarding) ───────────
    location ^~ /api/ {
        limit_req          zone=api_zone burst=20 nodelay;
        rewrite            ^/api/(.*) /$1 break;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
    }

    # ── All other backend routes ───────────────────────────────────────────
    location ^~ /analytics/       { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /paypal/          { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /subscriptions/   { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /video_courses/   { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /tests/           { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /resources/       { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /users_admin/     { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /content_admin/   { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /announcements/   { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /coupons_admin/   { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /leaderboard/     { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /support/         { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /skill_labs/      { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /achievements/    { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /labs/            { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /teoria/          { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /sql_skills/      { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /battle/          { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /certificates/    { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /referrals/       { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /flashcard_spaced/ { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    location ^~ /search/          { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }

    # ── SQL Skills API — IMPORTANT: router prefix is /sql/, NOT /sql_skills/ ─
    location ^~ /sql/             { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }

    # ── Skill Labs API — router prefix is /skill-labs/ (with dash) ──────────
    location ^~ /skill-labs/      { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }

    # ── Stripe Webhook — must reach backend directly (raw body required) ────
    location = /webhook/stripe {
        proxy_pass              http://backend:8000/webhook/stripe;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $forwarded_proto;
        proxy_set_header        CF-Connecting-IP  $http_cf_connecting_ip;
        # Preserve raw body so Stripe signature validation works
        proxy_request_buffering off;
        proxy_buffering         off;
    }
    # ── Dashboard SPA root — exact match so React Router handles it ───────
    # Without these, ^~ /dashboard/ below matches bare /dashboard/ and sends
    # it to FastAPI → 404 JSON. Exact match (=) always wins over ^~.
    location = /dashboard  { root /usr/share/nginx/html; try_files $uri /index.html; }
    location = /dashboard/ { root /usr/share/nginx/html; try_files $uri /index.html; }
    location ^~ /dashboard/       { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }
    # ── Admin API routes (/admin/users/*, /admin/questions/*, etc.) ────────
    # IMPORTANT: /admin/ routes are backend API routes, NOT frontend routes.
    # Without this block, nginx falls through to location / and serves index.html,
    # causing axios to receive HTML instead of JSON → frontend crash.
    location ^~ /admin/           { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; proxy_set_header CF-Connecting-IP $http_cf_connecting_ip; }

    location ^~ /health           { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; }
    location ^~ /docs             { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; }
    location ^~ /openapi.json     { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; }
    location ^~ /redoc            { proxy_pass http://backend:8000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $forwarded_proto; }

    # ── WebSockets (Labs de terminal) ─────────────────────────────────────
    location ^~ /ws {
        proxy_pass         http://backend:8000;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "Upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_read_timeout 86400s;
    }

    # ═══════════════════════════════════════════════════════════════════════
    # FRONTEND — React SPA
    # This only matches requests NOT already matched by ^~ locations above.
    # ═══════════════════════════════════════════════════════════════════════
    location / {
        root  /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Static assets (long cache) — regex location, lowest priority
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        root    /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Error pages ───────────────────────────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"detail":"Demasiadas peticiones. Por favor, espera un momento."}';
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root     /usr/share/nginx/html;
        internal;
    }
}
