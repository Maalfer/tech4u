# ── Cloudflare Real IP ───────────────────────────────────────────────────────
# Cloudflare sends real client IP in CF-Connecting-IP and X-Forwarded-For.
# These are Cloudflare's IPv4 ranges (updated March 2025).
# IMPORTANT: set_real_ip_from requires the ngx_http_realip_module (included in nginx:stable-alpine).
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

server {
    listen 80;
    server_name tech4uacademy.es www.tech4uacademy.es;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # ── Proxy upstream shared settings ───────────────────────────────────────
    # Avoids 502 when backend takes time to start or is under load
    proxy_connect_timeout   10s;
    proxy_send_timeout      60s;
    proxy_read_timeout      120s;
    proxy_buffer_size       16k;
    proxy_buffers           4 16k;
    proxy_busy_buffers_size 32k;

    # ── Frontend (archivos estáticos compilados) ──────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Assets con hash → caché larga; HTML → sin caché
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Rate limiting: login y registro (doble protección junto a FastAPI) ────
    location = /auth/login {
        limit_req zone=login_zone burst=3 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    }

    location = /auth/register {
        limit_req zone=register_zone burst=2 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    }

    # ── Backend API — con prefijo /api/ (usado por algunos clientes) ──────────
    # Strip /api/ prefix before forwarding to FastAPI
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
    }

    # ── Backend API — rutas directas (sin prefijo /api/) ─────────────────────
    # CRITICAL: proxy_pass usa el nombre del servicio Docker 'backend', NUNCA localhost/127.0.0.1
    location ~ ^/(auth|oauth|analytics|paypal|subscriptions|video_courses|tests|resources|users_admin|content_admin|announcements|coupons_admin|leaderboard|support|skill_labs|achievements|labs|teoria|sql_skills|battle|certificates|referrals|flashcard_spaced|search|health|docs|openapi.json|redoc|dashboard) {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;
    }

    # ── WebSockets (Labs de terminal interactivo) ─────────────────────────────
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "Upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_read_timeout 86400s;  # WebSocket connections can be long-lived
    }

    # ── Rate limiting básico en Nginx (primera línea de defensa) ─────────────
    # Definir zonas en http{} context — esto va en nginx.conf principal,
    # pero como usamos conf.d/default.conf, usamos limit_req directamente.
    # La zona se define abajo en el server para que funcione en conf.d/.

    # ── Páginas de error ──────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
