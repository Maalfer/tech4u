server {
    listen 80;
    # Aquí es donde ocurre la magia:
    server_name tech4uacademy.es www.tech4uacademy.es;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el Backend (FastAPI)
    # Importante: Redirige todas las rutas del API al contenedor del backend
    location ~ ^/(auth|oauth|analytics|paypal|subscriptions|video_courses|tests|resources|users_admin|content_admin|announcements|coupons_admin|leaderboard|support|skill_labs|achievements|labs|teoria|sql_skills|battle|certificates|referrals|flashcard_spaced|search|health|docs|openapi.json) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Soporte para WebSockets (Terminal)
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
