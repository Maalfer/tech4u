# ── Rate limiting zones (nivel http{}) ──────────────────────────────────────
# Este archivo se copia a /etc/nginx/conf.d/rate_limit.conf
# Se incluye automáticamente dentro del bloque http{} de Nginx.

# ── Forwarded-Proto map ───────────────────────────────────────────────────────
# nginx escucha en puerto 80 (HTTP), así que $scheme siempre es "http".
# Cloudflare pone X-Forwarded-Proto: https en cada petición HTTPS.
# Si usamos $scheme en proxy_set_header X-Forwarded-Proto, FastAPI genera
# redirect URLs con http:// → el navegador las bloquea como mixed content.
# Esta map hace que $forwarded_proto sea "https" cuando Cloudflare lo indica,
# y cae al $scheme real para desarrollo local sin Cloudflare.
map $http_x_forwarded_proto $forwarded_proto {
    default  $scheme;   # dev local: usa el scheme real (http)
    https    https;     # Cloudflare production: siempre https
    http     http;
}

# Zona para login: max 5 req/min por IP (10MB de memoria → ~80.000 IPs)
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;

# Zona para registro: max 3 req/min por IP
limit_req_zone $binary_remote_addr zone=register_zone:10m rate=3r/m;

# Zona general de API: max 60 req/min por IP (1 req/s)
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;

# Respuesta cuando se supera el límite
limit_req_status 429;
